name: Request Independent Code Review

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for requesting independent review (e.g. ready for SIT/UAT)'
        required: true
        default: 'Substantial change ready for independent review'

jobs:
  notify-reviewer:
    runs-on: ubuntu-latest
    steps:
      - name: Send Review Request Email
        uses: dawidd6/action-send-mail@v16
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: false
          username: sajjadalam6@gmail.com
          password: rucz vnda iofb zgmr
          subject: "[Code Review Request] ${{ github.repository }} - ${{ github.ref_name }}"
          to: sajjad_alam@epam.com
          from: sajjadalam6@gmail.com
          body: |
            An independent code review has been requested.

            Repository: ${{ github.repository }}
            Branch: ${{ github.ref_name }}
            Triggered by: ${{ github.actor }}
            Reason: ${{ github.event.inputs.reason }}

            Please review the code at:
            https://github.com/${{ github.repository }}/tree/${{ github.ref_name }}

            Log your observations as Jira tickets and assign them to the developer.
            Code cannot be promoted until all tickets are resolved.
